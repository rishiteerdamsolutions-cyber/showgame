<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="a" cx="50%" cy="52%" r="92%">
      <stop offset="0%" stop-color="#1a1618"/>
      <stop offset="45%" stop-color="#0f0e12"/>
      <stop offset="100%" stop-color="#020205"/>
    </radialGradient>
    <radialGradient id="bloom" cx="50%" cy="42%" r="48%">
      <stop offset="0%" stop-color="#ffcdd2" stop-opacity="0.35"/>
      <stop offset="35%" stop-color="#c62828" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="edge" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b71c1c" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3e2723" stop-opacity="0.6"/>
    </linearGradient>
    <pattern id="spark" patternUnits="userSpaceOnUse" width="26" height="26">
      <circle cx="13" cy="10" r="0.85" fill="#fff" opacity="0.35"/>
      <circle cx="5" cy="19" r="0.55" fill="#ffcdd2" opacity="0.45"/>
      <circle cx="20" cy="20" r="0.55" fill="#ef9a9a" opacity="0.35"/>
    </pattern>
    <radialGradient id="vign" cx="50%" cy="50%" r="70%">
      <stop offset="45%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.72"/>
    </radialGradient>
    <filter id="g">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="320" height="480" fill="url(#a)"/>
  <rect width="320" height="480" fill="url(#spark)" opacity="0.42"/>
  <ellipse cx="160" cy="210" rx="110" ry="152" fill="url(#bloom)"/>
  <g fill="none" stroke="#fff" stroke-opacity="0.15" stroke-width="0.6">
    <circle cx="160" cy="240" r="145"/>
    <circle cx="160" cy="240" r="115"/>
    <circle cx="160" cy="240" r="88"/>
  </g>
  <!-- abstract hourglass / diamond radiance -->
  <path fill="url(#edge)" opacity="0.55" filter="url(#g)"
        d="M160 388 L146 394 L154 382 L154 358 L146 356 L154 348 L154 328 L146 316 L174 316 L166 328 L166 348 L174 356 L174 382 L174 394 Z"/>
  <path stroke="#ff5252" stroke-width="1.8" opacity="0.45" fill="none"
        d="M160 130 Q270 238 160 382 Q50 238 160 130"/>
  <path stroke="#c62828" stroke-width="0.85" opacity="0.35" fill="none"
        d="M92 394 L228 394 M160 128 L228 394 M160 128 L92 394"/>
  <ellipse cx="160" cy="234" rx="96" ry="58" stroke="#ff7961" stroke-opacity="0.22" stroke-width="2"/>
  <rect width="320" height="480" fill="url(#vign)"/>
</svg>
