  </g>
  <circle cx="160" cy="226" r="104" stroke="#ff5722" stroke-opacity="0.15" stroke-width="10" fill="none" filter="url(#g)" opacity="0.6"/>
  <rect width="320" height="480" fill="url(#vign)"/>
